name: Update jobs.xml

on:
  schedule:
    - cron: "0 */6 * * *" # cada 6 horas
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: jobs-xml-update
  cancel-in-progress: true

jobs:
  crawl:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Install Playwright (Chromium)
        run: npx playwright install --with-deps chromium

      - name: Run crawler + export XML
        run: npm run run

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          # stage outputs (si existen)
          git add public/jobs.xml data/jobs.json || true

          # no-op si no hay cambios
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Auto update jobs.xml"

          # por si hubo commits nuevos en remote (Actions a veces se pisa con Pages u otro job)
          git pull --rebase origin main
          git push origin main
